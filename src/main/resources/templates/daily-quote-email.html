<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Georgia, serif; background: #fdf6ec; padding: 40px;">
<div style="max-width:520px; margin:auto; background:white;
            border-radius:12px; padding:40px;
            box-shadow:0 4px 20px rgba(0,0,0,0.05); font-family:Georgia, serif;">
    <p style="color: #aaa; font-size: 13px;" th:text="${date}"></p>
    <h2 style="color: #c07a30;">Good Morning, <span th:text="${name}"></span> ☀️</h2>

    <blockquote style="border-left: 4px solid #c07a30; margin: 24px 0;
                           padding: 16px 24px; font-size: 20px; color: #444;
                           font-style: italic;">
        "<span th:text="${quote}"></span>"
    </blockquote>

    <p style="text-align: right; color: #888;">
        — <span th:text="${author}"></span>
    </p>

    <hr style="border: none; border-top: 1px solid #eee; margin: 32px 0;"/>
    <p style="font-size: 12px; color: #bbb; text-align: center;">
        You're receiving this because you subscribed to Morning Quotes.
    </p>
</div>
</body>
</html>
