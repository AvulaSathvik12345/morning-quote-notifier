<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Georgia, serif; background: #fdf6ec; padding: 40px;">
<div style="max-width:520px; margin:auto; background:white;
            border-radius:12px; padding:40px;
            box-shadow:0 4px 20px rgba(0,0,0,0.05); font-family:Georgia, serif;">
    <h2 style="color: #c07a30;">Hello, <span th:text="${name}"></span>!</h2>
    <p>Your verification code is:</p>
    <div style="font-size: 36px; font-weight: bold; letter-spacing: 10px;
                    color: #c07a30; text-align: center; padding: 20px;">
        <span th:text="${otp}"></span>
    </div>
    <p style="color: #888; font-size: 13px;">
        This code expires in 10 minutes. Do not share it with anyone.
    </p>
</div>
</body>
</html>
