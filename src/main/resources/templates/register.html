<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Daily Quotes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #fdf6ec, #f8efe3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            margin: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            color: #c07a30;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: 0.2s;
        }

        input:focus {
            border-color: #c07a30;
            outline: none;
            box-shadow: 0 0 0 2px rgba(192,122,48,0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #c07a30;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #a86422;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px;
            }

            h1 {
                font-size: 22px;
            }

            input, button {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

<div class="card">
    <h1>☀️ Morning Quotes</h1>
    <p>Start your day with inspiration.</p>

    <form th:action="@{/register}" th:object="${registerRequest}" method="post">
        <input type="text" th:field="*{name}" placeholder="Your name" required/>
        <input type="email" th:field="*{email}" placeholder="Your email" required/>
        <button type="submit">Subscribe →</button>
    </form>
</div>

</body>
</html>
